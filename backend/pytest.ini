[pytest]
asyncio_mode = auto
testpaths = tests
asyncio_default_fixture_loop_scope = function

# Filter known deprecation warnings
filterwarnings =
    # jose library uses deprecated datetime.utcnow()
    ignore:datetime.datetime.utcnow\(\) is deprecated:DeprecationWarning
    # pytest-asyncio fixture redefinition (our custom fixtures handle this)
    ignore:The event_loop fixture provided by pytest-asyncio has been redefined:DeprecationWarning
