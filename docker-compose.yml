version: "3.9"

# ======================================================================
# Unified Docker Compose for TokenMind (Frontend + Backend)
# ======================================================================

services:
  # ======================================================================
  # Frontend - Next.js Application
  # ======================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${TARGET:-production}
    container_name: tokenmind-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ======================================================================
  # Backend - FastAPI Application
  # ======================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${TARGET:-production}
    container_name: tokenmind-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tokenmind
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ======================================================================
  # Alembic Migrations
  # ======================================================================
  alembic:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${TARGET:-production}
    container_name: tokenmind-alembic
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tokenmind
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tokenmind-net

  # ======================================================================
  # PostgreSQL Database
  # ======================================================================
  db:
    image: postgres:16-alpine
    container_name: tokenmind-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tokenmind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ======================================================================
  # Redis Cache
  # ======================================================================
  redis:
    image: redis:7-alpine
    container_name: tokenmind-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - tokenmind-net
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ======================================================================
  # MinIO (S3-compatible Object Storage)
  # ======================================================================
  minio:
    image: minio/minio:latest
    container_name: tokenmind-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ======================================================================
  # MinIO Init (bucket creation)
  # ======================================================================
  minio-init:
    image: minio/mc:latest
    container_name: tokenmind-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/${MINIO_BUCKET:-ip-documents} --ignore-existing;
      exit 0;
      "
    networks:
      - tokenmind-net

# ======================================================================
# Networks
# ======================================================================
networks:
  tokenmind-net:
    driver: bridge

# ======================================================================
# Volumes
# ======================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  uploads:
    driver: local
