# ======================================================================
# TokenMind Backend Stack
# ======================================================================

services:
  # ======================================================================
  # Backend API
  # ======================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tokenmind-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ======================================================================
  # Alembic Migrations
  # ======================================================================
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tokenmind-migrate
    env_file:
      - .env
    command: ["migrate"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - tokenmind-net

  # ======================================================================
  # Frontend (optional)
  # ======================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: tokenmind-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ======================================================================
  # PostgreSQL Database
  # ======================================================================
  db:
    image: postgres:16-alpine
    container_name: tokenmind-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tokenmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ======================================================================
  # Redis Cache
  # ======================================================================
  redis:
    image: redis:7-alpine
    container_name: tokenmind-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ======================================================================
  # MinIO (S3-compatible Object Storage)
  # ======================================================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: tokenmind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - tokenmind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ======================================================================
  # MinIO Init (bucket creation)
  # ======================================================================
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: tokenmind-minio-init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-ip-documents}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set tokenmind http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 1
        done
        mc mb --ignore-existing tokenmind/"$${MINIO_BUCKET}"
        mc anonymous set private tokenmind/"$${MINIO_BUCKET}" || true
    networks:
      - tokenmind-net

networks:
  tokenmind-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  backend-uploads:
    driver: local
